assignments:
- agent: vllm-model
  task: dbbench-std
concurrency:
  agent:
    vllm-model: 1
  task:
    dbbench-std: 1
definition:
  agent:
    vllm-model:
      module: src.client.agents.HTTPAgent
      parameters:
        body:
          max_tokens: 512
          model: kmd2525/test105_v6
          temperature: 0
        headers:
          Content-Type: application/json
        name: vllm-model
        prompter:
          args:
            agent_role: assistant
          name: role_content_dict
        return_format: '{response[choices][0][message][content]}'
        url: http://localhost:8000/v1/chat/completions
  task:
    dbbench-std:
      module: src.client.TaskClient
      parameters:
        concurrency: 1
        controller_address: http://localhost:5020/api
        data_file: data/dbbench/s_150.jsonl
        max_round: 15
        name: dbbench-std
output: outputs/dbbench-vllm
